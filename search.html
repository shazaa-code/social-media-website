<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Search — Unfinished</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root { --dark:#2C2F3A; --mid:#4A4F68; --accent:#9C8ADE; --light:#F3F1FA; --muted:#C9CBD6; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { background:var(--dark); color:var(--light); font-family:'DM Sans',sans-serif; font-weight:300; line-height:1.6; min-height:100vh; }
    a { color:inherit; text-decoration:none; }

    /* ── NAV ── */
    nav {
      position:sticky; top:0; z-index:99;
      background:rgba(44,47,58,.92); backdrop-filter:blur(12px);
      border-bottom:1px solid rgba(156,138,222,.1);
      display:flex; align-items:center; justify-content:space-between;
      padding:.9rem 1.5rem; gap:1rem;
    }
    .logo { font-family:'Playfair Display',serif; font-size:1.2rem; flex-shrink:0; }
    .logo span { color:var(--accent); }
    .nav-links { display:flex; gap:1.5rem; list-style:none; }
    .nav-links a { font-size:.85rem; color:var(--muted); transition:color .2s; }
    .nav-links a:hover, .nav-links a.active { color:var(--light); }
    .nav-right { display:flex; gap:.5rem; flex-shrink:0; }
    .btn { display:inline-flex; align-items:center; padding:.42rem 1rem; border-radius:99px; font-family:'DM Sans',sans-serif; font-size:.82rem; font-weight:500; cursor:pointer; border:none; transition:all .2s; text-decoration:none; }
    .btn-primary { background:var(--accent); color:var(--dark); }
    .btn-primary:hover { background:#b09fe8; }
    .btn-ghost { background:transparent; color:var(--light); border:1px solid rgba(201,203,214,.25); }
    .btn-ghost:hover { border-color:var(--accent); color:var(--accent); }

    /* ── SEARCH HERO ── */
    .search-hero { background:var(--mid); padding:3rem 1.5rem 2rem; }
    .search-hero h1 { font-family:'Playfair Display',serif; font-size:clamp(1.6rem,4vw,2.2rem); margin-bottom:1.25rem; }

    .search-wrap { position:relative; max-width:600px; }
    .search-input {
      width:100%; padding:.75rem 4.5rem .75rem 1.25rem;
      background:var(--dark); border:1px solid rgba(201,203,214,.15);
      border-radius:99px; color:var(--light);
      font-family:'DM Sans',sans-serif; font-size:.95rem; outline:none;
      transition:border-color .2s;
    }
    .search-input:focus { border-color:var(--accent); }
    .search-input::placeholder { color:rgba(201,203,214,.35); }
    .search-go {
      position:absolute; right:.35rem; top:50%; transform:translateY(-50%);
      background:var(--accent); color:var(--dark); border:none;
      border-radius:99px; padding:.48rem 1.1rem;
      font-family:'DM Sans',sans-serif; font-size:.82rem; font-weight:500; cursor:pointer;
      transition:background .2s;
    }
    .search-go:hover { background:#b09fe8; }

    /* Suggestions */
    .suggestions {
      position:absolute; top:calc(100% + .4rem); left:0; right:0;
      background:var(--dark); border:1px solid rgba(156,138,222,.18);
      border-radius:12px; overflow:hidden; display:none; z-index:50;
    }
    .suggestions.open { display:block; }
    .sugg-item { padding:.65rem 1.25rem; font-size:.875rem; color:var(--muted); cursor:pointer; display:flex; align-items:center; gap:.6rem; transition:background .15s; }
    .sugg-item:hover { background:rgba(156,138,222,.08); color:var(--light); }

    /* ── FILTERS BAR ── */
    .filters {
      border-bottom:1px solid rgba(201,203,214,.1);
      padding:.85rem 1.5rem; display:flex; align-items:center;
      gap:1rem; flex-wrap:wrap;
    }
    .filter-group { display:flex; align-items:center; gap:.4rem; flex-wrap:wrap; }
    .filter-label { font-size:.75rem; color:var(--muted); white-space:nowrap; }
    .chip { padding:.28rem .8rem; border-radius:99px; font-size:.78rem; border:1px solid rgba(201,203,214,.18); color:var(--muted); background:none; cursor:pointer; font-family:'DM Sans',sans-serif; transition:all .15s; }
    .chip:hover { border-color:rgba(156,138,222,.4); color:var(--light); }
    .chip.active { border-color:var(--accent); color:var(--accent); background:rgba(156,138,222,.1); }
    .filter-sep { color:rgba(201,203,214,.2); }
    select.chip { padding:.28rem .7rem; }

    /* ── RESULTS ── */
    .results-wrap { max-width:760px; margin:0 auto; padding:1.75rem 1.5rem 5rem; }
    .results-meta { font-size:.8rem; color:var(--muted); margin-bottom:1.25rem; }
    .results-meta strong { color:var(--light); }

    /* Post row */
    .post-row {
      display:flex; gap:0; background:var(--mid);
      border:1px solid rgba(156,138,222,.08); border-radius:10px;
      margin-bottom:.6rem; overflow:hidden; transition:border-color .2s;
    }
    .post-row:hover { border-color:rgba(156,138,222,.3); }
    .vote-col { display:flex; flex-direction:column; align-items:center; gap:.3rem; padding:.85rem .6rem; background:rgba(44,47,58,.3); min-width:46px; }
    .vote-btn { background:none; border:none; color:var(--muted); cursor:pointer; font-size:1rem; line-height:1; padding:0; transition:color .2s; }
    .vote-btn:hover { color:var(--accent); }
    .vote-count { font-size:.78rem; font-weight:500; color:var(--light); }
    .post-content { flex:1; padding:.85rem 1rem; min-width:0; }
    .post-top { display:flex; align-items:center; gap:.5rem; font-size:.72rem; color:var(--muted); margin-bottom:.4rem; flex-wrap:wrap; }
    .cat-pill { background:rgba(156,138,222,.12); color:var(--accent); padding:.15rem .55rem; border-radius:99px; font-size:.68rem; letter-spacing:.06em; text-transform:uppercase; }
    .post-title-link { font-size:.95rem; color:var(--light); display:block; margin-bottom:.35rem; line-height:1.35; }
    .post-title-link:hover { color:var(--accent); }
    .post-excerpt { font-size:.82rem; color:var(--muted); display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; margin-bottom:.55rem; }
    .mini-prog-row { display:flex; align-items:center; gap:.6rem; margin-bottom:.55rem; }
    .mini-prog { flex:1; max-width:120px; height:3px; background:rgba(201,203,214,.12); border-radius:99px; overflow:hidden; }
    .mini-prog-fill { height:100%; background:linear-gradient(90deg,var(--mid),var(--accent)); border-radius:99px; }
    .mini-label { font-size:.72rem; color:var(--muted); }
    .post-tags { display:flex; gap:.3rem; flex-wrap:wrap; margin-bottom:.55rem; }
    .tag { font-size:.68rem; padding:.18rem .55rem; border-radius:99px; border:1px solid rgba(201,203,214,.18); color:rgba(201,203,214,.6); }
    .post-actions { display:flex; gap:.2rem; }
    .action-btn { display:flex; align-items:center; gap:.3rem; background:none; border:none; color:var(--muted); font-family:'DM Sans',sans-serif; font-size:.75rem; cursor:pointer; padding:.3rem .6rem; border-radius:6px; transition:all .15s; }
    .action-btn:hover { background:rgba(156,138,222,.08); color:var(--light); }

    /* Empty */
    .empty { text-align:center; padding:4rem 0; color:var(--muted); }
    .empty a { color:var(--accent); }

    /* FOOTER */
    footer { border-top:1px solid rgba(201,203,214,.1); padding:1.5rem; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:.75rem; font-size:.78rem; color:var(--muted); }
    footer a { color:var(--muted); margin-left:1.25rem; }
    footer a:hover { color:var(--accent); }

    @media(max-width:640px) { .nav-links { display:none; } }
  </style>
</head>
<body>

<!-- NAV -->
<nav>
  <a href="index.html" class="logo">Un<span>finished</span></a>
  <ul class="nav-links">
    <li><a href="categories.html">Browse</a></li>
    <li><a href="trending.html">Trending</a></li>
    <li><a href="search.html" class="active">Search</a></li>
    <li><a href="create-post.html">+ Share</a></li>
  </ul>
  <div class="nav-right">
    <a href="login.html" class="btn btn-ghost">Sign in</a>
    <a href="register.html" class="btn btn-primary">Join</a>
  </div>
</nav>

<!-- SEARCH HERO -->
<div class="search-hero">
  <h1>Find the unfinished.</h1>
  <div class="search-wrap">
    <input class="search-input" id="q" type="text" placeholder="Search posts, titles, reasons…" autocomplete="off" oninput="onType()" onkeydown="if(event.key==='Enter')doSearch()" />
    <button class="search-go" onclick="doSearch()">Search</button>
    <div class="suggestions" id="sugg"></div>
  </div>
</div>

<!-- FILTERS -->
<div class="filters">
  <div class="filter-group">
    <span class="filter-label">Category:</span>
    <button class="chip active" data-cat="" onclick="setChip(this,'cat')">All</button>
    <button class="chip" data-cat="Books" onclick="setChip(this,'cat')">📖 Books</button>
    <button class="chip" data-cat="Courses" onclick="setChip(this,'cat')">💻 Courses</button>
    <button class="chip" data-cat="Habits" onclick="setChip(this,'cat')">🏃 Habits</button>
    <button class="chip" data-cat="TV" onclick="setChip(this,'cat')">🎬 TV</button>
    <button class="chip" data-cat="Projects" onclick="setChip(this,'cat')">🛠️ Projects</button>
    <button class="chip" data-cat="Games" onclick="setChip(this,'cat')">🎮 Games</button>
  </div>
  <span class="filter-sep">|</span>
  <div class="filter-group">
    <span class="filter-label">Sort:</span>
    <select class="chip" id="sortSel" onchange="render()">
      <option value="relates">Top</option>
      <option value="recent">New</option>
      <option value="progress">Progress</option>
    </select>
  </div>
</div>

<!-- RESULTS -->
<div class="results-wrap">
  <div class="results-meta" id="meta"></div>
  <div id="feed"></div>
</div>

<footer>
  <span>© 2025 <strong>Un<span style="color:var(--accent)">finished</span></strong></span>
  <div><a href="about.html">About</a><a href="contact.html">Contact</a></div>
</footer>

<script>
  const ALL = [
    { id:1, title:"Infinite Jest — David Foster Wallace", cat:"Books",    excerpt:"500 pages in. The footnotes became a second novel.", progress:62, tags:["Too dense","Lost focus"],        author:"Layla M.",  relates:347,  comments:12 },
    { id:2, title:"Python Bootcamp — Udemy",             cat:"Courses",  excerpt:"Stopped at section 12. Work got busy.",              progress:38, tags:["Life happened","No time"],        author:"Marcus T.", relates:821,  comments:34 },
    { id:3, title:"Daily meditation — 30-day challenge", cat:"Habits",   excerpt:"Day 11 was a Monday. That was that.",                progress:37, tags:["Lost motivation","Streak broken"], author:"Sana K.",   relates:1204, comments:56 },
    { id:4, title:"Severance — Season 2",                cat:"TV",       excerpt:"Started S2 twice. The pacing just didn't grip me.",  progress:45, tags:["Emotionally heavy","Too slow"],    author:"Omar R.",   relates:58,   comments:7  },
    { id:5, title:"Personal finance tracker app",        cat:"Projects", excerpt:"Got to the charts component then redesigned it all.", progress:25, tags:["Scope creep","Perfectionism"],    author:"Dev A.",    relates:432,  comments:21 },
    { id:6, title:"Atomic Habits — James Clear",         cat:"Books",    excerpt:"Made it to chapter 8. The habit didn't stick.",      progress:50, tags:["Irony","Lost motivation"],         author:"Nour L.",   relates:2091, comments:88 },
    { id:7, title:"Dark Souls III",                      cat:"Games",    excerpt:"Couldn't get past the second boss. 8 hours gone.",   progress:12, tags:["Too difficult","Rage quit"],       author:"Khalid B.", relates:644,  comments:31 },
    { id:8, title:"30-day running challenge",            cat:"Habits",   excerpt:"Day 14. It rained. Never went back.",                progress:47, tags:["Life happened"],                   author:"Yasmin S.", relates:320,  comments:14 },
  ];

  let query = '', activeCat = '';
  function initials(n) { return n.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase(); }

  function results() {
    const q = query.toLowerCase();
    const sort = document.getElementById('sortSel').value;
    return ALL
      .filter(p => (!activeCat || p.cat === activeCat) && (!q || p.title.toLowerCase().includes(q) || p.excerpt.toLowerCase().includes(q) || p.tags.some(t=>t.toLowerCase().includes(q))))
      .sort((a,b) => sort === 'recent' ? b.id - a.id : sort === 'progress' ? b.progress - a.progress : b.relates - a.relates);
  }

  function render() {
    const posts = results();
    const meta  = document.getElementById('meta');
    const feed  = document.getElementById('feed');
    meta.innerHTML = posts.length
      ? `<strong>${posts.length}</strong> result${posts.length !== 1 ? 's' : ''}${query ? ` for "<strong>${query}</strong>"` : ''}`
      : '';
    if (!posts.length) {
      feed.innerHTML = '<div class="empty"><p>Nothing found. <a href="categories.html">Browse all posts →</a></p></div>';
      return;
    }
    feed.innerHTML = posts.map(p => `
      <div class="post-row">
        <div class="vote-col">
          <button class="vote-btn" onclick="this.style.color='var(--accent)'">▲</button>
          <span class="vote-count">${p.relates >= 1000 ? (p.relates/1000).toFixed(1)+'k' : p.relates}</span>
          <button class="vote-btn" onclick="">▽</button>
        </div>
        <div class="post-content">
          <div class="post-top">
            <span class="cat-pill">${p.cat}</span>
            <span>${initials(p.author)} ${p.author}</span>
          </div>
          <a class="post-title-link" href="post.html?id=${p.id}">${highlight(p.title, query)}</a>
          <div class="post-excerpt">${highlight(p.excerpt, query)}</div>
          <div class="mini-prog-row">
            <div class="mini-prog"><div class="mini-prog-fill" style="width:${p.progress}%"></div></div>
            <span class="mini-label">${p.progress}% through</span>
          </div>
          <div class="post-tags">${p.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
          <div class="post-actions">
            <button class="action-btn" onclick="location.href='post.html?id=${p.id}'">💬 ${p.comments} comments</button>
            <button class="action-btn">🔖 Save</button>
          </div>
        </div>
      </div>
    `).join('');
  }

  function highlight(text, q) {
    if (!q) return text;
    const re = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
    return text.replace(re, '<mark style="background:rgba(156,138,222,.25);color:var(--light);border-radius:3px;">$1</mark>');
  }

  function onType() {
    query = document.getElementById('q').value.trim();
    render();
    const sugg = document.getElementById('sugg');
    if (!query) { sugg.classList.remove('open'); return; }
    const hits = ALL.filter(p => p.title.toLowerCase().includes(query.toLowerCase())).slice(0,4);
    if (!hits.length) { sugg.classList.remove('open'); return; }
    sugg.innerHTML = hits.map(p => `<div class="sugg-item" onclick="pick('${p.title.replace(/'/,"\\'")}')" >🔍 ${p.title}</div>`).join('');
    sugg.classList.add('open');
  }

  function pick(title) {
    document.getElementById('q').value = title;
    query = title;
    document.getElementById('sugg').classList.remove('open');
    render();
  }

  function doSearch() {
    query = document.getElementById('q').value.trim();
    document.getElementById('sugg').classList.remove('open');
    render();
  }

  function setChip(btn, group) {
    document.querySelectorAll(`.chip[data-cat]`).forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeCat = btn.dataset.cat;
    render();
  }

  document.addEventListener('click', e => { if (!e.target.closest('.search-wrap')) document.getElementById('sugg').classList.remove('open'); });

  // Read ?q= from URL
  const urlQ = new URLSearchParams(location.search).get('q');
  if (urlQ) { document.getElementById('q').value = urlQ; query = urlQ; }
  render();
</script>
</body>
</html>
