<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Unfinished</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root { --dark:#2C2F3A; --mid:#4A4F68; --accent:#9C8ADE; --light:#F3F1FA; --muted:#C9CBD6; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { background:var(--dark); color:var(--light); font-family:'DM Sans',sans-serif; font-weight:300; min-height:100vh; display:flex; flex-direction:column; }
    a { color:inherit; text-decoration:none; }

    /* NAV */
    nav { display:flex; align-items:center; justify-content:space-between; padding:.9rem 1.5rem; border-bottom:1px solid rgba(201,203,214,.08); }
    .logo { font-family:'Playfair Display',serif; font-size:1.2rem; }
    .logo span { color:var(--accent); }
    .nav-links { display:flex; gap:1.5rem; list-style:none; }
    .nav-links a { font-size:.85rem; color:var(--muted); transition:color .2s; }
    .nav-links a:hover { color:var(--light); }

    /* PAGE */
    .page { flex:1; display:flex; align-items:center; justify-content:center; padding:2rem 1.25rem; }

    /* CARD */
    .card { width:100%; max-width:380px; }

    .card-logo { font-family:'Playfair Display',serif; font-size:1.5rem; margin-bottom:1.75rem; display:block; }
    .card-logo span { color:var(--accent); }

    h1 { font-family:'Playfair Display',serif; font-size:1.7rem; margin-bottom:.35rem; }
    .sub { font-size:.875rem; color:var(--muted); margin-bottom:2rem; }

    /* FIELDS */
    .field { margin-bottom:1.1rem; }
    .field label { display:block; font-size:.8rem; color:var(--muted); margin-bottom:.4rem; }
    .field input {
      width:100%; background:var(--mid);
      border:1px solid rgba(201,203,214,.12);
      border-radius:8px; padding:.7rem 1rem;
      color:var(--light); font-family:'DM Sans',sans-serif; font-size:.9rem;
      outline:none; transition:border-color .2s;
    }
    .field input:focus { border-color:var(--accent); }
    .field input::placeholder { color:rgba(201,203,214,.35); }

    /* password eye */
    .pw-wrap { position:relative; }
    .pw-eye { position:absolute; right:.8rem; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; font-size:.9rem; opacity:.45; transition:opacity .2s; }
    .pw-eye:hover { opacity:1; }

    .row-between { display:flex; align-items:center; justify-content:space-between; margin-bottom:1.5rem; }
    .remember { display:flex; align-items:center; gap:.4rem; font-size:.82rem; color:var(--muted); cursor:pointer; }
    .remember input { accent-color:var(--accent); }
    .forgot { font-size:.82rem; color:var(--accent); }
    .forgot:hover { text-decoration:underline; }

    .btn-submit {
      width:100%; padding:.75rem; background:var(--accent); color:var(--dark);
      border:none; border-radius:99px; font-family:'DM Sans',sans-serif;
      font-size:.95rem; font-weight:500; cursor:pointer; transition:background .2s;
    }
    .btn-submit:hover { background:#b09fe8; }

    .err { font-size:.78rem; color:#e07070; margin-top:.3rem; display:none; }
    .form-msg { text-align:center; font-size:.82rem; margin-top:.85rem; min-height:1.2em; }
    .form-msg.ok { color:#7edea0; }
    .form-msg.bad { color:#e07070; }

    .divider { display:flex; align-items:center; gap:.75rem; margin:1.5rem 0; }
    .divider::before, .divider::after { content:''; flex:1; height:1px; background:rgba(201,203,214,.12); }
    .divider span { font-size:.75rem; color:var(--muted); }

    .switch { text-align:center; font-size:.85rem; color:var(--muted); margin-top:1.5rem; }
    .switch a { color:var(--accent); }
    .switch a:hover { text-decoration:underline; }

    /* FOOTER */
    footer { padding:1.25rem 1.5rem; text-align:center; font-size:.75rem; color:rgba(201,203,214,.4); border-top:1px solid rgba(201,203,214,.06); }

    @media(max-width:500px) { .nav-links { display:none; } }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">Un<span>finished</span></a>
  <ul class="nav-links">
    <li><a href="categories.html">Browse</a></li>
    <li><a href="trending.html">Trending</a></li>
  </ul>
</nav>

<div class="page">
  <div class="card">

    <a href="index.html" class="card-logo">Un<span>finished</span></a>

    <h1>Welcome back.</h1>
    <p class="sub">Sign in to share what you abandoned next.</p>

    <form id="loginForm" novalidate onsubmit="submit(event)">

      <div class="field">
        <label for="email">Email</label>
        <input id="email" type="email" placeholder="you@example.com" autocomplete="email" />
        <span class="err" id="emailErr">Enter a valid email.</span>
      </div>

      <div class="field">
        <label for="pw">Password</label>
        <div class="pw-wrap">
          <input id="pw" type="password" placeholder="••••••••" autocomplete="current-password" />
          <button type="button" class="pw-eye" id="eye" onclick="togglePw()">👁</button>
        </div>
        <span class="err" id="pwErr">Password is required.</span>
      </div>

      <div class="row-between">
        <label class="remember"><input type="checkbox" /> Remember me</label>
        <a class="forgot" href="#">Forgot password?</a>
      </div>

      <button type="submit" class="btn-submit">Sign in</button>
      <div class="form-msg" id="msg"></div>

    </form>

    <div class="divider"><span>or</span></div>

    <div class="switch">Don't have an account? <a href="register.html">Join free →</a></div>

  </div>
</div>

<footer>© 2025 Unfinished · No judgment here.</footer>

<script>
  function togglePw() {
    const pw  = document.getElementById('pw');
    const eye = document.getElementById('eye');
    const show = pw.type === 'password';
    pw.type = show ? 'text' : 'password';
    eye.textContent = show ? '🙈' : '👁';
  }

  function showErr(id, show) {
    document.getElementById(id).style.display = show ? 'block' : 'none';
  }

  function submit(e) {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const pw    = document.getElementById('pw').value;
    let ok = true;

    showErr('emailErr', !email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email));
    showErr('pwErr', !pw);
    if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) ok = false;
    if (!pw) ok = false;
    if (!ok) return;

    const msg = document.getElementById('msg');
    msg.textContent = 'Signing in…';
    msg.className = 'form-msg';
    setTimeout(() => {
      msg.textContent = '✓ Signed in! Redirecting…';
      msg.className = 'form-msg ok';
      setTimeout(() => window.location.href = 'index.html', 900);
    }, 800);
  }
</script>
</body>
</html>
